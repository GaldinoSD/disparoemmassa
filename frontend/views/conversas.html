<!-- Style Overrides for Fixed Viewport & Chat Aesthetics -->
<style>
    /* Prevent general window scroll and force strict height of 100vh only when Conversas tab is active */
    html.conversas-active, html.conversas-active body {
        overflow: hidden !important;
        height: 100vh !important;
    }
    
    /* Set the main content container to fill viewport without overflow only when Conversas tab is active */
    html.conversas-active #main-content {
        height: 100vh !important;
        overflow: hidden !important;
        display: flex !important;
        flex-direction: column !important;
    }
    
    /* Set inner workspace main area to occupy 100% of space without padding or margin only when Conversas tab is active */
    html.conversas-active #main-content > main {
        height: calc(100vh - 5rem) !important; /* 5rem is header h-20 */
        padding: 0 !important;
        margin: 0 !important;
        display: flex !important;
        flex-direction: column !important;
        overflow: hidden !important;
        flex: 1 !important;
        min-height: 0 !important;
        max-width: 100% !important;
        width: 100% !important;
    }

    /* Constrain views container and active tab to fill exactly 100% of the parent main height without overflow only when Conversas tab is active */
    html.conversas-active #views-container {
        height: 100% !important;
        width: 100% !important;
        display: flex !important;
        flex-direction: column !important;
        flex: 1 !important;
        min-height: 0 !important;
        overflow: hidden !important;
    }
    
    html.conversas-active #tab-conversas {
        height: 100% !important;
        width: 100% !important;
        display: flex !important;
        flex-direction: column !important;
        flex: 1 !important;
        min-height: 0 !important;
        overflow: hidden !important;
    }

    /* Abstract Tech Blueprint Background for Chat Area */
    .chat-wallpaper {
        background-color: rgba(248, 250, 252, 0.3);
        background-image: radial-gradient(rgba(16, 185, 129, 0.04) 1px, transparent 0), radial-gradient(rgba(16, 185, 129, 0.04) 1px, transparent 0);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
    }
    
    .dark .chat-wallpaper {
        background-color: rgba(9, 15, 25, 0.2);
        background-image: radial-gradient(rgba(16, 185, 129, 0.02) 1px, transparent 0), radial-gradient(rgba(16, 185, 129, 0.02) 1px, transparent 0);
    }

    /* Smooth customized scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
        height: 5px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(100, 116, 139, 0.2);
        border-radius: 99px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(16, 185, 129, 0.4);
    }
</style>

<!-- =======================================================
        CHAT LAYOUT CONTAINER (Full screen, integrated, flex)
     ======================================================= -->
<div class="flex flex-1 min-h-0 h-full w-full bg-white dark:bg-[#090f19] overflow-hidden">
    
    <!-- 📇 SIDEBAR: CONTACTS LIST (A bit smaller: width 300px) -->
    <div class="w-[300px] bg-slate-50/50 dark:bg-slate-900/10 border-r border-slate-200 dark:border-slate-800/80 flex flex-col h-full overflow-hidden shrink-0 p-4">
        
        <!-- Sidebar Header with minimalist status badge -->
        <div class="flex items-center justify-between mb-4 shrink-0">
            <div class="flex items-center gap-2">
                <i class="fa-brands fa-whatsapp text-emerald-500 text-base"></i>
                <span class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Conversas</span>
            </div>
            <!-- Minimalist active status badge -->
            <div class="flex items-center gap-1.5 px-2 py-0.5 bg-emerald-500/10 dark:bg-emerald-500/5 rounded-md border border-emerald-500/20 text-emerald-500 text-[9px] font-black uppercase tracking-wider" id="contactsCount">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span>
                <span>Ativo</span>
            </div>
        </div>
        
        <!-- Search Input Bar -->
        <div class="relative mb-4 shrink-0">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-400 text-xs"><i class="fas fa-search"></i></span>
            <input type="text" id="chatSearch" onkeyup="filterContacts()" placeholder="Buscar contato ou número..." 
                   class="w-full pl-9 pr-4 py-2.5 text-xs bg-slate-100/50 dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 dark:text-white transition-all">
        </div>

        <!-- Contacts Scroll Area -->
        <div class="flex-1 overflow-y-auto space-y-2 pr-1 custom-scrollbar" id="contactsList">
            <!-- Pulsing Skeleton Loader (Contacts list startup) -->
            <div class="space-y-3 animate-pulse">
                <div class="flex items-center gap-3.5 p-3.5 bg-slate-200/20 dark:bg-slate-800/10 rounded-xl border border-transparent">
                    <div class="w-11 h-11 rounded-lg bg-slate-200 dark:bg-slate-800 shrink-0"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 bg-slate-200 dark:bg-slate-750 rounded w-1/3"></div>
                        <div class="h-2.5 bg-slate-150 dark:bg-slate-800 rounded w-2/3"></div>
                    </div>
                </div>
                <div class="flex items-center gap-3.5 p-3.5 bg-slate-200/20 dark:bg-slate-800/10 rounded-xl border border-transparent">
                    <div class="w-11 h-11 rounded-lg bg-slate-200 dark:bg-slate-800 shrink-0"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 bg-slate-200 dark:bg-slate-750 rounded w-1/4"></div>
                        <div class="h-2.5 bg-slate-150 dark:bg-slate-800 rounded w-3/4"></div>
                    </div>
                </div>
                <div class="flex items-center gap-3.5 p-3.5 bg-slate-200/20 dark:bg-slate-800/10 rounded-xl border border-transparent">
                    <div class="w-11 h-11 rounded-lg bg-slate-200 dark:bg-slate-800 shrink-0"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 bg-slate-200 dark:bg-slate-750 rounded w-2/5"></div>
                        <div class="h-2.5 bg-slate-150 dark:bg-slate-800 rounded w-1/2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 💬 MAIN: ACTIVE CHAT SCREEN (Fills remainder width) -->
    <div class="flex-1 bg-white dark:bg-[#0b1322] flex flex-col h-full overflow-hidden relative">
        
        <!-- Chat Top Bar -->
        <div class="px-5 py-3.5 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-900/10 shrink-0">
            <div class="flex items-center gap-3.5">
                <div class="w-11 h-11 rounded-lg bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-400 dark:text-slate-400 font-extrabold text-sm shadow-sm" id="chat-avatar">-</div>
                <div>
                    <h3 class="text-xs font-extrabold text-slate-800 dark:text-white" id="chat-title">Selecione uma conversa</h3>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-400 inline-block" id="status-dot"></span>
                        <span class="text-[9px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-widest" id="status-text">Aguardando</span>
                        <span class="text-slate-350 dark:text-slate-700 font-light">|</span>
                        <span class="text-[9px] font-mono text-slate-400 dark:text-slate-500 font-extrabold" id="chat-number">-</span>
                    </div>
                </div>
            </div>

            <!-- Header Actions -->
            <div class="flex items-center gap-1">
                <button class="w-8 h-8 rounded-lg hover:bg-red-500/10 flex items-center justify-center text-slate-400 hover:text-red-500 active:scale-95 transition-all" title="Limpar Histórico Visual" onclick="clearActiveChat()">
                    <i class="fa-solid fa-trash text-[11px]"></i>
                </button>
                <button class="w-8 h-8 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 active:scale-95 transition-all" title="Ver Informações">
                    <i class="fa-solid fa-circle-info text-[11px]"></i>
                </button>
            </div>
        </div>

        <!-- Messages Stream Wallpaper Viewport -->
        <div class="flex-1 overflow-y-auto p-6 space-y-4 chat-wallpaper custom-scrollbar" id="chatStream">
            <div class="flex flex-col items-center justify-center h-full text-slate-400 space-y-3">
                <div class="w-14 h-14 rounded-xl bg-slate-100 dark:bg-slate-900/60 flex items-center justify-center text-slate-400 border border-slate-200 dark:border-slate-800 shadow-sm">
                    <i class="fa-regular fa-comments text-2xl animate-pulse"></i>
                </div>
                <p class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Nenhuma Conversa Selecionada</p>
                <p class="text-[10px] text-slate-400 max-w-[220px] text-center leading-relaxed">Clique em uma das conversas ativas na barra lateral para carregar a interação em tempo real.</p>
            </div>
        </div>

        <!-- Integrated Glass Command Input Interface -->
        <div class="relative shrink-0 border-t border-slate-200 dark:border-slate-800 p-4 bg-slate-50/50 dark:bg-slate-900/10">
            
            <!-- Floating Emoji Popover -->
            <div id="emojiPopover" class="hidden absolute bottom-20 left-4 w-72 max-w-[90vw] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4 shadow-2xl z-50 animate-premium">
                <div class="flex items-center justify-between mb-3 border-b border-slate-200 dark:border-slate-800 pb-2">
                    <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest">Emojis rápidos</span>
                    <div class="flex gap-1.5">
                        <button type="button" onclick="setEmojiTab('smileys')" class="emoji-tab-btn text-[9px] px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-600 font-bold">😀</button>
                        <button type="button" onclick="setEmojiTab('vehicles')" class="emoji-tab-btn text-[9px] px-2 py-0.5 rounded text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800">🚗</button>
                        <button type="button" onclick="setEmojiTab('tools')" class="emoji-tab-btn text-[9px] px-2 py-0.5 rounded text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800">🔧</button>
                    </div>
                </div>
                
                <div id="emojiGrid" class="grid grid-cols-6 gap-2.5 max-h-40 overflow-y-auto pr-1 custom-scrollbar text-lg text-center">
                    <!-- Loaded programmatically -->
                </div>
            </div>

            <!-- Gorgeous File Attachment Preview Box -->
            <div id="attachmentPreview" class="hidden absolute bottom-20 left-4 right-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-3 shadow-xl z-40 flex items-center justify-between gap-4 animate-premium">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="w-9 h-9 rounded-lg bg-emerald-500/10 text-emerald-600 flex items-center justify-center text-sm shrink-0 border border-emerald-500/20" id="attachmentIcon">
                        <i class="fa-solid fa-file-invoice"></i>
                    </div>
                    <div class="min-w-0">
                        <p class="text-[11px] font-extrabold text-slate-800 dark:text-white truncate" id="attachmentName">documento.pdf</p>
                        <p class="text-[9px] text-slate-400 font-extrabold" id="attachmentSize">0 KB</p>
                    </div>
                </div>
                <button type="button" onclick="clearAttachment()" class="w-7 h-7 rounded-lg hover:bg-red-500/15 text-slate-400 hover:text-red-500 flex items-center justify-center transition-all">
                    <i class="fa-solid fa-xmark text-xs"></i>
                </button>
            </div>

            <!-- Hidden File Input -->
            <input type="file" id="chatFileInput" class="hidden" onchange="handleFileSelected(event)">

            <!-- Command Form -->
            <form onsubmit="submitChatMessage(event)" class="flex gap-2 items-center bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800/80 rounded-xl p-1.5 shadow-sm focus-within:ring-2 focus-within:ring-emerald-500/25 focus-within:border-emerald-500 transition-all">
                <!-- Action Buttons -->
                <div class="flex items-center gap-0.5 pl-1">
                    <button type="button" id="emojiBtn" onclick="toggleEmojiPopover()" class="w-9 h-9 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-900 flex items-center justify-center text-slate-400 hover:text-emerald-500 transition-all" title="Emojis">
                        <i class="fa-regular fa-face-smile text-base"></i>
                    </button>
                    <button type="button" onclick="document.getElementById('chatFileInput').click()" class="w-9 h-9 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-900 flex items-center justify-center text-slate-400 hover:text-emerald-500 transition-all" title="Anexar Arquivo">
                        <i class="fa-solid fa-paperclip text-sm"></i>
                    </button>
                </div>
                
                <!-- Borderless input field -->
                <input type="text" id="messageInput" required autocomplete="off" placeholder="Digite sua mensagem..." 
                       class="flex-1 bg-transparent border-none outline-none text-xs dark:text-white px-2 py-2 placeholder-slate-400 dark:placeholder-slate-400">
                
                <!-- Send Action Button -->
                <button type="submit" class="w-9 h-9 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white flex items-center justify-center shadow shadow-emerald-500/20 active:scale-95 transition-all shrink-0">
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </form>
        </div>
    </div>
</div>
