<!-- Stats Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
  
  <!-- Card: Total Disparos -->
  <div class="card-premium p-6 flex flex-col relative overflow-hidden group">
    <div class="absolute -top-6 -right-6 w-20 h-20 bg-purple-500/5 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
    <div class="w-12 h-12 rounded-2xl bg-purple-500/10 text-purple-600 dark:text-purple-400 flex items-center justify-center text-xl mb-4 shadow-lg shadow-purple-500/5 group-hover:rotate-6 transition-transform">
      <i class="fa-solid fa-paper-plane"></i>
    </div>
    <div id="stat-total-disparos" class="text-3xl font-black text-slate-800 dark:text-white tracking-tight mb-1">0</div>
    <div class="text-[11px] font-black uppercase tracking-wider text-slate-400 dark:text-slate-500">Total de Disparos</div>
  </div>

  <!-- Card: Sucesso -->
  <div class="card-premium p-6 flex flex-col relative overflow-hidden group">
    <div class="absolute -top-6 -right-6 w-20 h-20 bg-emerald-500/5 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
    <div class="w-12 h-12 rounded-2xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 flex items-center justify-center text-xl mb-4 shadow-lg shadow-emerald-500/5 group-hover:rotate-6 transition-transform">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <div id="stat-sucesso" class="text-3xl font-black text-slate-800 dark:text-white tracking-tight mb-1">0</div>
    <div class="text-[11px] font-black uppercase tracking-wider text-slate-400 dark:text-slate-500">Enviados com Sucesso</div>
  </div>

  <!-- Card: Falhas -->
  <div class="card-premium p-6 flex flex-col relative overflow-hidden group">
    <div class="absolute -top-6 -right-6 w-20 h-20 bg-rose-500/5 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
    <div class="w-12 h-12 rounded-2xl bg-rose-500/10 text-rose-600 dark:text-rose-400 flex items-center justify-center text-xl mb-4 shadow-lg shadow-rose-500/5 group-hover:rotate-6 transition-transform">
      <i class="fa-solid fa-triangle-exclamation"></i>
    </div>
    <div id="stat-falhas" class="text-3xl font-black text-slate-800 dark:text-white tracking-tight mb-1">0</div>
    <div class="text-[11px] font-black uppercase tracking-wider text-slate-400 dark:text-slate-500">Disparos com Falha</div>
  </div>

  <!-- Card: Instâncias -->
  <div class="card-premium p-6 flex flex-col relative overflow-hidden group">
    <div class="absolute -top-6 -right-6 w-20 h-20 bg-blue-500/5 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
    <div class="w-12 h-12 rounded-2xl bg-blue-500/10 text-blue-600 dark:text-blue-400 flex items-center justify-center text-xl mb-4 shadow-lg shadow-blue-500/5 group-hover:rotate-6 transition-transform">
      <i class="fa-solid fa-satellite-dish"></i>
    </div>
    <div id="stat-instancias" class="text-3xl font-black text-slate-800 dark:text-white tracking-tight mb-1">0</div>
    <div class="text-[11px] font-black uppercase tracking-wider text-slate-400 dark:text-slate-500">Instâncias Conectadas</div>
  </div>

</div>

<!-- Dashboard Row -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
  
  <!-- Campanhas Recentes -->
  <div class="card-premium p-6 lg:col-span-2 flex flex-col justify-between">
    <div>
      <div class="flex items-center gap-3 mb-6">
        <div class="w-8 h-8 rounded-lg bg-purple-500/10 text-purple-600 dark:text-purple-400 flex items-center justify-center">
          <i class="fa-solid fa-chart-line text-sm"></i>
        </div>
        <h3 class="text-sm font-black uppercase tracking-[0.1em] text-slate-700 dark:text-slate-200">Campanhas Recentes</h3>
      </div>
      
      <!-- List wrapper -->
      <div id="dashboard-recent-campaigns" class="space-y-4 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
        <!-- Renderizado via app.js -->
        <div class="flex items-center justify-center p-8 text-slate-400">
          <i class="fa-solid fa-spinner animate-spin mr-2"></i> Carregando dados do SQLite...
        </div>
      </div>
    </div>
  </div>

  <!-- Status do Servidor & Conectividade -->
  <div class="card-premium p-6 flex flex-col justify-between">
    <div>
      <div class="flex items-center gap-3 mb-6">
        <div class="w-8 h-8 rounded-lg bg-purple-500/10 text-purple-600 dark:text-purple-400 flex items-center justify-center">
          <i class="fa-solid fa-server text-sm"></i>
        </div>
        <h3 class="text-sm font-black uppercase tracking-[0.1em] text-slate-700 dark:text-slate-200">Status do Servidor</h3>
      </div>

      <div class="space-y-5">
        <!-- SQLite Database Health -->
        <div class="flex items-center justify-between p-3.5 bg-slate-900/5 dark:bg-white/5 border border-slate-900/5 dark:border-white/5 rounded-2xl">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-emerald-500/10 text-emerald-600 flex items-center justify-center">
              <i class="fa-solid fa-database text-xs"></i>
            </div>
            <div>
              <div class="text-[11px] font-black text-slate-800 dark:text-white uppercase tracking-tight">Banco SQLite</div>
              <div class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-0.5">Base Local Ativa</div>
            </div>
          </div>
          <span class="px-2.5 py-1 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-500/20 rounded-lg text-[9px] font-black uppercase tracking-widest">Saudável</span>
        </div>

        <!-- Engine Status -->
        <div class="flex items-center justify-between p-3.5 bg-slate-900/5 dark:bg-white/5 border border-slate-900/5 dark:border-white/5 rounded-2xl">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-purple-500/10 text-purple-600 flex items-center justify-center">
              <i class="fa-solid fa-gears text-xs"></i>
            </div>
            <div>
              <div class="text-[11px] font-black text-slate-800 dark:text-white uppercase tracking-tight">Motor de Envio</div>
              <div class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-0.5">Thread principal</div>
            </div>
          </div>
          <span class="px-2.5 py-1 bg-purple-500/10 text-purple-600 dark:text-purple-400 border border-purple-500/20 rounded-lg text-[9px] font-black uppercase tracking-widest">Aguardando</span>
        </div>

        <!-- Connection Latency -->
        <div class="flex items-center justify-between p-3.5 bg-slate-900/5 dark:bg-white/5 border border-slate-900/5 dark:border-white/5 rounded-2xl">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-500/10 text-blue-600 flex items-center justify-center">
              <i class="fa-solid fa-microchip text-xs"></i>
            </div>
            <div>
              <div class="text-[11px] font-black text-slate-800 dark:text-white uppercase tracking-tight">Consumo CPU / RAM</div>
              <div class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-0.5">Uso de recursos</div>
            </div>
          </div>
          <span class="px-2.5 py-1 bg-blue-500/10 text-blue-600 dark:text-blue-400 border border-blue-500/20 rounded-lg text-[9px] font-black uppercase tracking-widest">Estável</span>
        </div>
      </div>
    </div>
  </div>

</div>
