<div class="card-premium p-6 md:p-8 flex flex-col justify-between">
  
  <!-- Header of Logs -->
  <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-8">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-purple-500/10 text-purple-600 dark:text-purple-400 flex items-center justify-center">
        <i class="fa-solid fa-clock-rotate-left text-sm"></i>
      </div>
      <h3 class="text-sm font-black uppercase tracking-[0.1em] text-slate-700 dark:text-slate-200">Logs Completos de Disparos</h3>
    </div>
    
    <button id="btn-clear-logs" class="flex items-center justify-center gap-2 px-5 py-2.5 border border-rose-500/20 bg-rose-500/5 hover:bg-rose-500/10 text-rose-600 rounded-2xl font-black active:scale-[0.98] transition-all text-xs uppercase tracking-wider cursor-pointer">
      <i class="fa-solid fa-trash-can"></i> Limpar Histórico
    </button>
  </div>

  <!-- Logs Table Wrapper -->
  <div class="overflow-x-auto overflow-y-auto max-h-[500px] custom-scrollbar -mx-6 md:mx-0 rounded-2xl border border-slate-900/5 dark:border-white/5 bg-slate-900/5 dark:bg-white/5">
    <table class="w-full text-left border-collapse text-xs md:text-sm">
      <thead class="sticky top-0 z-10 bg-slate-50 dark:bg-[#1e293b] border-b border-slate-200 dark:border-slate-800 text-[11px] font-black uppercase tracking-[0.1em] text-slate-400 dark:text-slate-500">
        <tr>
          <th class="py-4 px-5">Data/Hora</th>
          <th class="py-4 px-5">Campanha</th>
          <th class="py-4 px-5">Destinatário</th>
          <th class="py-4 px-5">Telefone</th>
          <th class="py-4 px-5">Mensagem</th>
          <th class="py-4 px-5">Status</th>
        </tr>
      </thead>
      <tbody id="logs-table-body" class="divide-y divide-slate-900/5 dark:divide-white/5 font-semibold text-slate-600 dark:text-slate-350">
        <!-- Rendered via app.js -->
        <tr>
          <td colspan="6" class="text-center py-10 text-slate-400">
            <i class="fa-solid fa-spinner animate-spin mr-2"></i> Buscando histórico no banco SQLite...
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Load More Button -->
  <div id="logs-load-more-container" class="flex justify-center mt-6 hidden">
    <button id="btn-load-more-logs" class="flex items-center justify-center gap-2 px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white rounded-xl font-black text-xs uppercase tracking-wider shadow-lg shadow-indigo-500/10 hover:shadow-indigo-500/25 active:scale-[0.98] transition-all cursor-pointer">
      <i class="fa-solid fa-angles-down animate-bounce"></i> Carregar Mais Registros
    </button>
  </div>

</div>
