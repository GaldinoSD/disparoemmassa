  <head>

    <!-- ✅ Tailwind config + dark mode -->

      tailwind.config = {
        darkMode: "class",

          extend: {
            colors: {
              purple: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#0ea5e9', // Base Sky Blue premium (substitui o dourado)
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
                950: '#082f49',
              },
              indigo: {
                50: '#f0f6ff',
                100: '#e0edff',

                600: '#2563eb', // Royal Blue

    <script>
      (function () {
        try {
          const saved = localStorage.getItem("theme");
          const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          const shouldDark = saved ? (saved === "dark") : prefersDark;
          if (shouldDark) document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");
        } catch (e) {}
      })();
    </script>

    <!-- Prevent Login Flash Bug (Synchronous Blocker) -->
    <style id="auth-state-style">
      #login-screen, #app-screen { display: none !important; }
    </style>
    <script>
      (function () {
        try {
          const style = document.getElementById('auth-state-style');
          if (sessionStorage.getItem('zapflow_session')) {
            style.innerHTML = '#login-screen { display: none !important; } #app-screen { display: block !important; }';
          } else {
            style.innerHTML = '#login-screen { display: flex !important; } #app-screen { display: none !important; }';
          }
        } catch (e) {}
      })();
    </script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
      
      body {
        font-family: 'Outfit', sans-serif;
      }

      /* ✅ SIDEBAR FIXO */
      #sidebar {
        width: 260px;
        min-width: 260px;
        max-width: 260px;
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        z-index: 50;
        background: white;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .dark #sidebar { background: #0f172a; }

      /* ✅ MAIN CONTENT ADJUSTMENT */
      #main-content {
        margin-left: 260px;
        min-height: 100vh;
        transition: padding 0.3s ease;
      }

      @media (max-width: 1024px) {
        #sidebar {
          transform: translateX(-100%);
        }
        #sidebar.mobile-open {
          transform: translateX(0);
          left: 0;
        }
        #main-content {
          margin-left: 0;
        }
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.1);
        border-radius: 10px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.1);
      }

      /* ✅ SIDEBAR TAB ACTIVE */
      .menu-item.active a {
        background: rgba(37, 99, 235, 0.1);
        color: #2563eb !important;
      }
      .dark .menu-item.active a {
        background: rgba(14, 165, 233, 0.1);
        color: #0ea5e9 !important;
      }
      
      .menu-item.active a i {
        color: #2563eb !important;
      }
      .dark .menu-item.active a i {
        color: #0ea5e9 !important;
      }

      /* TOAST NOTIFICATION */
      #toast-container {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .toast {
        background: white;
        padding: 16px 24px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        border: 1px solid rgba(15, 23, 42, 0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        transform: translateX(120%);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        min-width: 300px;
      }
      .dark .toast {
        background: #1e293b;
        border-color: rgba(255,255,255,0.05);
      }
      .toast.show {
        transform: translateX(0);
      }
      .toast-success { border-left: 4px solid #10b981; }
      .toast-error { border-left: 4px solid #ef4444; }
      .toast-info { border-left: 4px solid #3b82f6; }
      .toast-warning { border-left: 4px solid #f59e0b; }

      .toast-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: rgba(0,0,0,0.1);
        width: 100%;
        transform-origin: left;
      }
      .toast-success .toast-progress-bar { background: #10b981; }
      .toast-error .toast-progress-bar { background: #ef4444; }
      .toast-info .toast-progress-bar { background: #3b82f6; }
      .toast-warning .toast-progress-bar { background: #f59e0b; }

      @keyframes toast-progress-anim {
        from { transform: scaleX(1); }
        to { transform: scaleX(0); }
      }
      .toast-progress-bar {
        height: 100%;
        width: 100%;
        animation: toast-progress-anim 4s linear forwards;
      }

      /* ✅ PREMIUM DESIGN TOKENS */
      :root {
        --card-shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
        --card-shadow-hover: 0 20px 60px -15px rgba(0,0,0,0.1);
      }
      .dark :root {
        --card-shadow: 0 10px 40px -10px rgba(0,0,0,0.3);
        --card-shadow-hover: 0 20px 60px -15px rgba(0,0,0,0.5);
      }

      .card-premium {
        background: white;
        border-radius: 2rem;
        border: 1px solid rgba(15, 23, 42, 0.05);
        box-shadow: var(--card-shadow);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .dark .card-premium {
        background: rgba(30, 41, 59, 0.4);
        border-color: rgba(255, 255, 255, 0.05);
      }
      .card-premium:hover {
        transform: translateY(-4px);
        box-shadow: var(--card-shadow-hover);
        border-color: rgba(14, 165, 233, 0.25);
      }

      .glass-premium {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .dark .glass-premium {
        background: rgba(15, 23, 42, 0.7);
        border-color: rgba(255, 255, 255, 0.05);
      }

      .btn-premium {
        padding: 0.75rem 1.5rem;
        border-radius: 1rem;
        font-weight: 700;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .btn-premium:active { transform: scale(0.95); }

      /* ================= PHONE SIMULATOR PREMIUM STYLE ================= */
      .phone-simulator {
        width: 100%;
        max-width: 310px;
        height: 550px;
        border: 11px solid #1e293b;
        border-radius: 44px;
        background: #efeae2;
        background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        background-repeat: repeat;
        background-size: 110px;
        background-blend-mode: overlay;
        box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.35);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        transition: all 0.3s ease;
      }
      .dark .phone-simulator {
        border-color: #0f172a;
        background: #0b141a;
        background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        background-repeat: repeat;
        background-size: 110px;
        background-blend-mode: overlay;
        box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.6);
      }

      /* Dynamic Island */
      .dynamic-island {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 18px;
        background-color: #000000;
        border-radius: 10px;
        z-index: 50;
        box-shadow: inset 0 0 4px rgba(255,255,255,0.15);
      }

      /* Status Bar iOS */
      .phone-status-bar {
        height: 38px;
        color: #000000;
        font-size: 9px;
        font-weight: 600;
        padding: 12px 18px 2px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 40;
        flex-shrink: 0;
        background: rgba(246, 246, 246, 0.85);
        backdrop-filter: blur(20px);
        transition: background 0.3s ease, color 0.3s ease;
      }
      .dark .phone-status-bar {
        background: rgba(27, 27, 27, 0.8);
        color: #ffffff;
      }

      .phone-status-bar .status-right {
        display: flex;
        align-items: center;
        gap: 3.5px;
      }

      .phone-status-bar .battery-outline {
        width: 15px;
        height: 8px;
        border: 1px solid currentColor;
        border-radius: 2px.5;
        padding: 0.5px;
        display: flex;
        position: relative;
      }
      .phone-status-bar .battery-outline::after {
        content: '';
        position: absolute;
        right: -2px;
        top: 2px;
        width: 1px;
        height: 3px;
        background: currentColor;
        border-radius: 0 1px 1px 0;
      }
      .phone-status-bar .battery-fill {
        height: 100%;
        width: 80%;
        background: currentColor;
        border-radius: 0.5px;
      }

      /* Phone Header WhatsApp iOS */
      .phone-header {
        height: 52px;
        background: rgba(246, 246, 246, 0.85);
        backdrop-filter: blur(20px);
        color: #000000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        z-index: 30;
        border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .dark .phone-header {
        background: rgba(27, 27, 27, 0.8);
        color: #ffffff;
        border-bottom-color: rgba(255, 255, 255, 0.08);
      }

      .phone-header .back-btn {
        color: #007aff;
        font-size: 11px;
        display: flex;
        align-items: center;
        gap: 2px;
        cursor: pointer;
      }
      .dark .phone-header .back-btn {
        color: #0a84ff;
      }

      .phone-header .profile-container {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }

      .phone-header .avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #007aff;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
      }
      .dark .phone-header .avatar {
        background: #0a84ff;
      }

      .phone-header .contact-info {
        display: flex;
        flex-direction: column;
      }

      .phone-header .contact-name {
        font-size: 11px;
        font-weight: 600;
        line-height: 1.1;
      }

      .phone-header .contact-status {
        font-size: 7.5px;
        color: #34c759;
        font-weight: 600;
        margin-top: 1px;
      }
      .dark .phone-header .contact-status {
        color: #30d158;
      }

      .phone-header .action-icons {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #007aff;
        font-size: 13px;
      }
      .dark .phone-header .action-icons {
        color: #0a84ff;
      }

      /* Phone Chat Area */
      .phone-chat-area {
        flex-grow: 1;
        padding: 12px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        overflow-y: auto;
        z-index: 10;
        padding-bottom: 24px; /* offset from swipe bar */
      }

      .phone-chat-area > *:first-child {
        margin-top: auto;
      }

      /* iOS WhatsApp Chat Bubble */
      .chat-bubble {
        background: #dcffd6;
        color: #000000;
        max-width: 82%;
        align-self: flex-end;
        padding: 8px 11px;
        border-radius: 14px 14px 2px 14px;
        box-shadow: 0 1px 1.5px rgba(0,0,0,0.12);
        font-size: 11.5px;
        line-height: 1.4;
        word-break: break-word;
        white-space: pre-wrap;
        position: relative;
        margin-top: 10px;
        margin-right: 4px;
        transition: background 0.3s ease, color 0.3s ease;
      }
      .dark .chat-bubble {
        background: #005c4b;
        color: #ffffff;
      }

      /* Custom iOS Bubble Tail on the bottom-right */
      .chat-bubble::after {
        content: "";
        position: absolute;
        right: -6px;
        bottom: 0;
        width: 8px;
        height: 10px;
        background: #dcffd6;
        clip-path: polygon(0 0, 100% 100%, 0 100%);
        transition: background 0.3s ease;
      }
      .dark .chat-bubble::after {
        background: #005c4b;
      }

      .chat-bubble .time {
        font-size: 7.5px;
        color: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 2.5px;
        margin-top: 3px;
      }
      .dark .chat-bubble .time {
        color: rgba(255, 255, 255, 0.5);
      }

      /* Phone Footer Bar iOS style */
      .phone-footer-bar {
        height: 52px;
        background: rgba(246, 246, 246, 0.85);
        backdrop-filter: blur(20px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px 14px 10px; /* space for home indicator */
        color: #007aff;
        z-index: 30;
        border-top: 0.5px solid rgba(0,0,0,0.1);
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      }
      .dark .phone-footer-bar {
        background: rgba(27, 27, 27, 0.8);
        color: #0a84ff;
        border-top-color: rgba(255, 255, 255, 0.08);
      }

      .phone-footer-bar .plus-icon {
        font-size: 16px;
        cursor: pointer;
        padding: 4px;
      }

      .phone-footer-bar .footer-input-wrapper {
        flex-grow: 1;
        margin: 0 8px;
        position: relative;
        display: flex;
        align-items: center;
      }

      .phone-footer-bar input {
        width: 100%;
        background: #ffffff;
        border: 0.5px solid rgba(0,0,0,0.2);
        border-radius: 16px;
        padding: 5px 32px 5px 10px;
        font-size: 11.5px;
        outline: none;
        box-shadow: none;
        transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        height: 28px;
      }
      .dark .phone-footer-bar input {
        background: #1c1c1e;
        border-color: rgba(255,255,255,0.15);
        color: #ffffff;
      }

      .phone-footer-bar .input-sticker-icon {
        position: absolute;
        right: 8px;
        color: #8e8e93;
        font-size: 12px;
      }

      .phone-footer-bar .footer-actions-right {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
      }

      /* Home Swipe Indicator */
      .iphone-home-indicator {
        position: absolute;
        bottom: 4px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 4px;
        background: #000000;
        border-radius: 2px;
        opacity: 0.8;
        z-index: 50;
        transition: background 0.3s ease;
      }
      .dark .iphone-home-indicator {
        background: #ffffff;
      }

      main:not(.p-0) {
        padding-top: 1.25rem !important;
      }
    </style>
  </head>

  <body class="min-h-screen bg-[#f8fafc] dark:bg-[#020617] text-slate-800 dark:text-slate-100 antialiased custom-scrollbar">
    <div id="toast-container"></div>

    <!-- ================= TELA DE LOGIN (Always Light Premium Glassmorphism) ================= -->
    <div id="login-screen" class="min-h-screen bg-[#f8fafc] flex items-center justify-center p-4 relative overflow-hidden">

    <!-- ================= TELA PRINCIPAL (DASHBOARD SPA) ================= -->
    <div id="app-screen" class="hidden">
      <div class="flex">
        
        <!-- ✅ SIDEBAR LATERAL -->
        <aside id="sidebar" class="border-r border-slate-900/10 dark:border-white/10 flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
          
          <!-- LOGO -->
          <div class="py-4 px-6 flex items-center justify-center h-20 shrink-0 border-b border-slate-900/5 dark:border-white/5">
            <div id="sidebar-logo-container" class="flex items-center justify-center w-full">

              <img id="sidebar-logo-img" class="max-h-16 w-auto object-contain hidden" alt="Sidebar Logo">
            </div>
          </div>
